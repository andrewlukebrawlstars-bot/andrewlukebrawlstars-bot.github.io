<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Headphones</title>

<!-- ADSENSE SCRIPT -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5095432097963724"
crossorigin="anonymous"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%, #22c55e33, transparent),
              radial-gradient(circle at 70% 70%, #3b82f633, transparent);
  animation: moveBg 10s infinite alternate;
  z-index:-1;
}

@keyframes moveBg {
  0% {transform: translate(0,0);}
  100% {transform: translate(-50px,-50px);}
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:60px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px #22c55e;}
  to {text-shadow:0 0 30px #22c55e;}
}

.hero img {
  width:280px;
  margin-top:20px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* BUTTON */
button {
  margin-top:20px;
  padding:12px 25px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* SECTION */
.section {
  padding:60px 20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.4s;
  opacity:0;
  transform:translateY(50px);
}

.card.show {
  opacity:1;
  transform:translateY(0);
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 30px #22c55e;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* ADS */
.ads {
  margin:40px 0;
  text-align:center;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HERO -->
<div class="hero">
  <h1>🎧 Future Sound</h1>
  <p>Sunet din viitor</p>
  <button onclick="scrollToProducts()">Explorează</button>
  <img src="https://images.unsplash.com/photo-1518441902117-0eeb7cba4b2a">
</div>

<!-- 🔝 TEST AD SUS -->
<div class="ads">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-5095432097963724"
       data-ad-slot="9433565718"
       data-ad-format="auto"
       data-full-width-responsive="true"
       data-adtest="on"></ins>
</div>

<!-- PRODUSE -->
<div class="section" id="products">
  <h2 style="text-align:center;">Top Headphones</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518441902117-0eeb7cba4b2a">
      <h3>Sony WH-1000XM5</h3>
      <p>Noise cancelling premium</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
      <h3>AirPods Max</h3>
      <p>Sunet ultra clar</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1580894894513-541e068a3e2b">
      <h3>JBL Quantum</h3>
      <p>Gaming performance</p>
    </div>

  </div>
</div>

<!-- 🔽 TEST AD JOS -->
<div class="ads">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-5095432097963724"
       data-ad-slot="9433565718"
       data-ad-format="auto"
       data-full-width-responsive="true"
       data-adtest="on"></ins>
</div>

<script>

// SCROLL
function scrollToProducts(){
  document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

// ANIMAȚII
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
  cards.forEach(card => {
    if(card.getBoundingClientRect().top < window.innerHeight - 100){
      card.classList.add("show");
    }
  });
});

// 🔥 ACTIVEAZĂ TEST ADS
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});

</script>

</body>
</html>
